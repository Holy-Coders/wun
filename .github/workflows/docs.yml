name: docs

# Build the Astro Starlight site under docs-site/ and publish to
# GitHub Pages on every push to master.
#
# Setup once in repo settings:
#   Settings → Pages → Source: "GitHub Actions"

on:
  push:
    branches: [master]
    paths:
      - "docs-site/**"
      - "docs/**"
      - "skills/**"
      - "CLAUDE.md"
      - "AGENTS.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install
        run: npm ci || npm install

      - name: Install Playwright Chromium (for build-time mermaid SVGs)
        id:   chromium
        run: npx playwright install --with-deps chromium
        continue-on-error: true

      - name: Build
        env:
          GH_PAGES:    "1"
          # Render mermaid SVGs only when the Chromium install above
          # succeeded. astro.config.mjs falls back to plain code blocks
          # when WUN_MERMAID is unset so a broken Chromium download
          # doesn't take the whole site build down.
          WUN_MERMAID: ${{ steps.chromium.outcome == 'success' && '1' || '' }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
