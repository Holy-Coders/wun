# fly.io app config. Generated by `wun new app --docker`. After
# `fly launch --no-deploy`, fly will rewrite the `app =` line and
# may add a `primary_region`.

app = "myapp"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST       = "0.0.0.0"
  WUN_STATIC = "/app/public"
  LOG_LEVEL  = "info"

[http_service]
  internal_port      = 8080
  force_https        = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes          = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout  = "5s"
    grace_period = "10s"
    method   = "get"
    path     = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1

# For embedded DBs (sqlite, datomic), uncomment the volume below and
# create it with:  fly volumes create myapp_data --region <region> --size 1
# Then re-deploy. For Postgres, attach a Fly Postgres app instead:
#   fly pg create
#   fly pg attach <pg-app-name>
# That sets DATABASE_URL automatically.

# [mounts]
#   source      = "myapp_data"
#   destination = "/app/data"
