<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Wun &middot; phase 0 spike</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; padding: 0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      body { padding: 32px; max-width: 720px; margin: 0 auto; }
      .wun-stack { display: flex; flex-direction: column; }
      .wun-stack[data-direction="row"] { flex-direction: row; align-items: center; }
      .wun-button {
        font: inherit; padding: 6px 14px; border-radius: 6px;
        border: 1px solid currentColor; background: transparent; cursor: pointer;
      }
      .wun-button:hover { background: rgba(0,0,0,0.05); }
      .wun-text--h1 { font-size: 32px; font-weight: 600; margin: 0; }
      .wun-text--h2 { font-size: 22px; font-weight: 600; margin: 0; }
      .wun-text--body { font-size: 15px; opacity: 0.75; margin: 0; }
      .wun-unknown { color: crimson; font-family: ui-monospace, monospace; }
      #status { font: 12px ui-monospace, monospace; opacity: 0.5; margin-top: 24px; }

      /* LiveView-style offline signal: when the SSE stream is down
         we add `wun-offline` to <body>. The last-known UI stays on
         screen (no blanking) but visually attenuates so the user
         knows their clicks won't go through right now. */
      body.wun-offline #app { opacity: 0.55; transition: opacity 200ms ease; }
      body.wun-offline::before {
        content: "offline · reconnecting…";
        position: fixed; top: 0; left: 0; right: 0;
        padding: 6px 12px; text-align: center;
        font: 12px ui-monospace, monospace;
        background: #fff3d6; color: #7a5300;
        border-bottom: 1px solid #f0d28a;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="status">connecting&hellip;</div>
    <script src="/js/main.js"></script>
  </body>
</html>
