<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32" aria-label="Wun" role="img">
  <rect width="64" height="64" rx="14" fill="#0a66c2"/>
  <!-- Three "W" peaks at increasing stroke widths suggest the three platforms.
       currentColor fallback keeps the mark usable in monochrome contexts. -->
  <g fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10 20 L18 46 L26 20" stroke-width="3.4" opacity="0.95"/>
    <path d="M22 20 L30 46 L38 20" stroke-width="4"   opacity="1"/>
    <path d="M34 20 L42 46 L50 20" stroke-width="4.6" opacity="0.85"/>
    <circle cx="54" cy="20" r="2.4" fill="white" stroke="none" opacity="0.9"/>
  </g>
</svg>
