<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 480" width="360" height="480" role="img" aria-label="Wun counter screen on iOS">
  <defs>
    <linearGradient id="iosBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1020"/>
      <stop offset="1" stop-color="#070b16"/>
    </linearGradient>
  </defs>
  <rect width="360" height="480" fill="url(#iosBg)"/>

  <!-- iPhone bezel -->
  <rect x="60" y="22" width="240" height="436" rx="34" fill="#0d1a30" stroke="#1f3a66" stroke-width="2"/>
  <rect x="60" y="22" width="240" height="436" rx="34" fill="none" stroke="#000" stroke-width="6" opacity="0.5"/>

  <!-- notch -->
  <rect x="148" y="34" width="64" height="14" rx="7" fill="#000"/>

  <!-- status bar -->
  <text x="84" y="62" font-family="-apple-system,system-ui,sans-serif" font-size="10" font-weight="600" fill="#e7efff">9:41</text>
  <g fill="#e7efff">
    <rect x="252" y="56" width="3" height="6" rx="0.5"/>
    <rect x="257" y="54" width="3" height="8" rx="0.5"/>
    <rect x="262" y="52" width="3" height="10" rx="0.5"/>
    <rect x="267" y="50" width="3" height="12" rx="0.5"/>
  </g>

  <!-- nav title -->
  <text x="180" y="106" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="22" font-weight="700" fill="#e7efff">Counter</text>

  <!-- card -->
  <rect x="84" y="146" width="192" height="200" rx="18" fill="#0d2b4f" stroke="#1f3a66" stroke-width="1"/>
  <text x="180" y="194" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="12" fill="#b6d4ff" opacity="0.85">value</text>
  <text x="180" y="262" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="64" font-weight="700" fill="#e7efff">3</text>

  <!-- buttons (iOS pill) -->
  <rect x="100" y="286" width="68" height="40" rx="20" fill="#4f9aef"/>
  <text x="134" y="312" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="14" font-weight="600" fill="#0a1020">+</text>
  <rect x="180" y="286" width="84" height="40" rx="20" fill="transparent" stroke="#4f9aef" stroke-width="1.5"/>
  <text x="222" y="312" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="13" font-weight="500" fill="#b6d4ff">reset</text>

  <!-- home indicator -->
  <rect x="140" y="438" width="80" height="4" rx="2" fill="#e7efff" opacity="0.7"/>
</svg>
