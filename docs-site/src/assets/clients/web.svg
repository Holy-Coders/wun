<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 480" width="360" height="480" role="img" aria-label="Wun counter screen on web">
  <defs>
    <linearGradient id="webBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1a30"/>
      <stop offset="1" stop-color="#0a1020"/>
    </linearGradient>
  </defs>
  <rect width="360" height="480" fill="url(#webBg)"/>

  <!-- browser chrome -->
  <rect x="0" y="0" width="360" height="40" fill="#0a66c2"/>
  <circle cx="14" cy="20" r="4" fill="#ffffff" opacity="0.95"/>
  <circle cx="28" cy="20" r="4" fill="#ffffff" opacity="0.7"/>
  <circle cx="42" cy="20" r="4" fill="#ffffff" opacity="0.5"/>
  <rect x="60" y="10" width="280" height="20" rx="10" fill="#ffffff" opacity="0.18"/>
  <text x="76" y="24" font-family="ui-monospace,monospace" font-size="11" fill="#ffffff" opacity="0.95">localhost:8081</text>

  <!-- nav -->
  <rect x="20" y="60" width="320" height="44" rx="10" fill="#0d2b4f"/>
  <text x="36" y="87" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" fill="#e7efff">myapp</text>
  <text x="240" y="87" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#b6d4ff" opacity="0.75">/ counter</text>

  <!-- card -->
  <rect x="32" y="140" width="296" height="220" rx="14" fill="#0d1a30" stroke="#1f3a66" stroke-width="1"/>
  <text x="180" y="180" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#b6d4ff" opacity="0.85">Counter</text>
  <text x="180" y="244" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="64" font-weight="700" fill="#e7efff">3</text>

  <!-- buttons -->
  <rect x="64"  y="284" width="112" height="40" rx="10" fill="#0a66c2"/>
  <text x="120" y="310" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600" fill="white">+</text>
  <rect x="184" y="284" width="112" height="40" rx="10" fill="transparent" stroke="#4f9aef" stroke-width="1.5"/>
  <text x="240" y="310" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="500" fill="#b6d4ff">reset</text>

  <!-- footnote -->
  <text x="180" y="412" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#4f9aef" opacity="0.7">SSE • optimistic morph</text>
</svg>
